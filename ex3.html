<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

canvas {
  display: block;
}

#ui-panel {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 20;
  font-family: Arial, sans-serif;
}

/* main and sub buttons */
#main-toggle,
#sub-buttons button {
  width: 160px;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #243949, #517fa4);
  color: white;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  transition: transform 0.2s, background 0.3s;
}

#main-toggle:hover,
#sub-buttons button:hover {
  transform: translateY(-2px);
  background: linear-gradient(135deg, #2c5364, #5f86a8);
}

#sub-buttons {
  display: flex;
  flex-direction: column;
  max-height: 300px;
  opacity: 1;
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.35s ease;
}

#sub-buttons.hidden {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
}

/* floating cards */
.gui-card {
  position: absolute;
  top: 0;
  left: 190px;
  width: 320px;
  padding: 12px;
  border-radius: 16px;
  background: rgba(18, 22, 32, 0.92);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.08);

  opacity: 1;
  transform: translateX(0);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.gui-card.hidden {
  opacity: 0;
  transform: translateX(-20px);
  pointer-events: none;
}

.lil-gui.root > .title {
  display: none !important; /* wanted to remove the built in title provided by lil-gui */
}
/* lil-gui inside the card */
.lil-gui {
  --width: 100%;
  --background-color: transparent;
  --title-background-color: rgba(255,255,255,0.08);
  --title-text-color: #ffffff;
  --text-color: #f0f3f8;
  --widget-color: rgba(255,255,255,0.08);
  --hover-color: rgba(255,255,255,0.14);
  --focus-color: #7db8ff;
  --padding: 8px;
  --spacing: 6px;
  --widget-height: 24px;
  box-shadow: none;
  border: none;
}
</style>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
  }
}
</script>

</head>

<body>
<div id="ui-panel">
  <button id="main-toggle">Controls</button>

  <div id="sub-buttons" class="hidden">
    <button id="light-btn">Light</button>
    <button id="robot-btn">Robot</button>
    <button id="kitchen-btn">Kitchen</button>
  </div>

  <div id="gui-light" class="gui-card hidden"></div>
  <div id="gui-robot" class="gui-card hidden"></div>
  <div id="gui-kitchen" class="gui-card hidden"></div>
</div>

<script type="module">
import { main } from './script.js';
import { kitchen } from './kitchen.js';
import { robot} from './robot.js';
import { lighting } from './lighting.js';
import { setupGUI} from './GUIsetup.js';

const { scene, controls, renderer, camera } = main();
const kitchenParts = kitchen(scene);
const robotParts = robot(scene);
const lightParts = lighting(scene, robotParts, kitchenParts);  // Capture the returned value here
setupGUI(lightParts, robotParts, kitchenParts);  // Now lightParts is defined

function animate() {
    requestAnimationFrame(animate);
    controls.update(); // only required if controls.enableDamping = true, or if controls.auto-rotation is enabled
    renderer.render(scene, camera);
}

animate(); // Start the animation loop
</script>

</body>
</html>
